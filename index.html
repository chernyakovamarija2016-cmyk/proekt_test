<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Генератор идеи для постов</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(160deg, #f8fafc 0%, #e2e8f0 100%);
      color: #1e293b;
      line-height: 1.6;
      padding: 2rem 1.5rem;
    }
    main {
      max-width: 36rem;
      margin: 0 auto;
      background: #fff;
      border-radius: 12px;
      padding: 2rem 2.25rem;
      box-shadow: 0 4px 24px rgba(15, 23, 42, 0.08);
    }
    h1 {
      margin: 0 0 1.5rem;
      font-size: 1.5rem;
      font-weight: 700;
      color: #0f172a;
    }
    ul {
      margin: 0;
      padding-left: 1.25rem;
    }
    li {
      margin-bottom: 0.75rem;
    }
    li:last-child {
      margin-bottom: 0;
    }
  </style>
</head>
<body>
  <main>
    <h1>Генератор идеи для постов</h1>
    <ul>
      <li>5 идей постов для экспертов</li>
      <li>3 идеи сторис на сегодня</li>
      <li>контент план на неделю</li>
    </ul>
  </main>
</body>
</html>
