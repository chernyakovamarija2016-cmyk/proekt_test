<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#eef2ff" id="meta-theme">
  <title>Генератор идеи для постов</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg-1: #eef2ff;
      --bg-2: #e0f2fe;
      --bg-3: #f0fdfa;
      --bg-4: #faf5ff;
      --surface: rgba(255, 255, 255, 0.78);
      --surface-elevated: rgba(255, 255, 255, 0.6);
      --text: #1e293b;
      --text-heading: #0f172a;
      --border: rgba(226, 232, 240, 0.95);
      --border-hover: rgba(165, 180, 252, 0.55);
      --shadow-card: 0 4px 6px -1px rgba(15, 23, 42, 0.06), 0 24px 48px -12px rgba(79, 70, 229, 0.12);
      --shadow-li-hover: 0 8px 20px -8px rgba(99, 102, 241, 0.2);
      --dot-glow: rgba(99, 102, 241, 0.22);
      --btn-gradient: linear-gradient(135deg, #6366f1 0%, #7c3aed 50%, #a855f7 100%);
      --btn-shadow: 0 4px 14px -2px rgba(99, 102, 241, 0.45);
      --toggle-bg: rgba(15, 23, 42, 0.06);
      --toggle-border: rgba(15, 23, 42, 0.08);
    }

    [data-theme="dark"] {
      --bg-1: #0f172a;
      --bg-2: #1e1b4b;
      --bg-3: #134e4a;
      --bg-4: #312e81;
      --surface: rgba(30, 41, 59, 0.82);
      --surface-elevated: rgba(51, 65, 85, 0.55);
      --text: #e2e8f0;
      --text-heading: #f8fafc;
      --border: rgba(71, 85, 105, 0.65);
      --border-hover: rgba(129, 140, 248, 0.45);
      --shadow-card: 0 4px 6px -1px rgba(0, 0, 0, 0.25), 0 24px 48px -12px rgba(0, 0, 0, 0.45);
      --shadow-li-hover: 0 8px 24px -8px rgba(99, 102, 241, 0.35);
      --dot-glow: rgba(129, 140, 248, 0.35);
      --btn-gradient: linear-gradient(135deg, #4f46e5 0%, #7c3aed 55%, #c084fc 100%);
      --btn-shadow: 0 4px 20px -2px rgba(79, 70, 229, 0.5);
      --toggle-bg: rgba(255, 255, 255, 0.08);
      --toggle-border: rgba(255, 255, 255, 0.12);
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: "Manrope", system-ui, sans-serif;
      font-size: 1rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.6;
      background: linear-gradient(125deg, var(--bg-1) 0%, var(--bg-2) 35%, var(--bg-3) 65%, var(--bg-4) 100%);
      background-size: 280% 280%;
      animation: bg-shift 22s ease-in-out infinite;
      -webkit-tap-highlight-color: transparent;
    }

    @keyframes bg-shift {
      0%, 100% { background-position: 0% 40%; }
      50% { background-position: 100% 60%; }
    }

    .app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      min-height: 100dvh;
      max-width: 28rem;
      margin: 0 auto;
      padding:
        max(0.75rem, env(safe-area-inset-top))
        max(1rem, env(safe-area-inset-right))
        max(0.5rem, env(safe-area-inset-bottom))
        max(1rem, env(safe-area-inset-left));
    }

    @media (min-width: 480px) {
      .app {
        padding-top: max(1.5rem, env(safe-area-inset-top));
        padding-bottom: max(1.5rem, env(safe-area-inset-bottom));
        justify-content: center;
      }
    }

    .app-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
      flex-shrink: 0;
    }

    .app-title {
      margin: 0;
      font-size: clamp(1.25rem, 4.2vw, 1.5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-heading);
      line-height: 1.25;
      animation: title-in 0.65s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
      opacity: 0;
      transform: translateY(8px);
    }

    @keyframes title-in {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .theme-toggle {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.35rem;
      border-radius: 999px;
      border: 1px solid var(--toggle-border);
      background: var(--toggle-bg);
      cursor: pointer;
      transition: transform 0.2s ease, background 0.25s ease;
    }

    .theme-toggle:active {
      transform: scale(0.96);
    }

    .theme-toggle:focus-visible {
      outline: 2px solid #6366f1;
      outline-offset: 2px;
    }

    .theme-toggle__track {
      position: relative;
      width: 2.75rem;
      height: 1.5rem;
      border-radius: 999px;
      background: var(--surface-elevated);
      border: 1px solid var(--border);
      transition: background 0.3s ease, border-color 0.3s ease;
    }

    [data-theme="dark"] .theme-toggle__track {
      background: rgba(99, 102, 241, 0.25);
      border-color: rgba(129, 140, 248, 0.35);
    }

    .theme-toggle__thumb {
      position: absolute;
      top: 2px;
      left: 2px;
      width: calc(1.5rem - 6px);
      height: calc(1.5rem - 6px);
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 1px 4px rgba(15, 23, 42, 0.2);
      transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    }

    [data-theme="dark"] .theme-toggle__thumb {
      transform: translateX(1.25rem);
      background: #e0e7ff;
    }

    .theme-toggle__icon {
      width: 1.1rem;
      height: 1.1rem;
      opacity: 0.55;
    }

    .app-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .card {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 1.25rem 1.125rem;
      background: var(--surface);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 20px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-card);
      animation: card-in 0.75s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      opacity: 0;
      transform: translateY(12px);
    }

    @media (max-width: 479px) {
      .card {
        border-radius: 22px;
        padding: 1.125rem 1rem 1rem;
      }
    }

    @keyframes card-in {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .list-wrap {
      flex: 1;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      margin-bottom: 0.75rem;
    }

    ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    li {
      position: relative;
      margin-bottom: 0.5rem;
      padding: 0.8125rem 0.875rem 0.8125rem 2.625rem;
      min-height: 2.75rem;
      display: flex;
      align-items: center;
      border-radius: 14px;
      background: var(--surface-elevated);
      border: 1px solid var(--border);
      transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1),
        box-shadow 0.3s ease,
        border-color 0.3s ease;
      opacity: 0;
      transform: translateX(-6px);
      animation: item-in 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    ul.refresh li {
      animation: none;
      opacity: 0;
      transform: translateY(6px);
    }

    ul.refresh.play li {
      animation: item-in 0.45s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    ul.refresh.play li:nth-child(1) { animation-delay: 0.05s; }
    ul.refresh.play li:nth-child(2) { animation-delay: 0.15s; }
    ul.refresh.play li:nth-child(3) { animation-delay: 0.25s; }

    li:nth-child(1) { animation-delay: 0.28s; }
    li:nth-child(2) { animation-delay: 0.42s; }
    li:nth-child(3) { animation-delay: 0.56s; }

    @keyframes item-in {
      to {
        opacity: 1;
        transform: translate(0);
      }
    }

    li::before {
      content: "";
      position: absolute;
      left: 0.875rem;
      top: 50%;
      transform: translateY(-50%);
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      box-shadow: 0 0 0 3px var(--dot-glow);
    }

    @media (hover: hover) {
      li:hover {
        transform: translateX(3px);
        border-color: var(--border-hover);
        box-shadow: var(--shadow-li-hover);
      }
    }

    li:last-child {
      margin-bottom: 0;
    }

    .app-footer {
      flex-shrink: 0;
      padding-top: 0.25rem;
    }

    .btn-generate {
      position: relative;
      width: 100%;
      min-height: 3.25rem;
      padding: 0.875rem 1.25rem;
      border: none;
      border-radius: 16px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: #fff;
      cursor: pointer;
      overflow: hidden;
      background: var(--btn-gradient);
      background-size: 200% 200%;
      box-shadow: var(--btn-shadow);
      transition: transform 0.2s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.25s ease;
      animation: btn-shimmer 4s ease-in-out infinite;
    }

    .btn-generate::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        105deg,
        transparent 0%,
        rgba(255, 255, 255, 0.18) 45%,
        rgba(255, 255, 255, 0.28) 50%,
        rgba(255, 255, 255, 0.12) 55%,
        transparent 100%
      );
      transform: translateX(-120%);
      animation: btn-gloss 3.5s ease-in-out infinite;
    }

    @keyframes btn-shimmer {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    @keyframes btn-gloss {
      0%, 35% { transform: translateX(-120%); }
      55%, 100% { transform: translateX(120%); }
    }

    .btn-generate:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 22px -4px rgba(99, 102, 241, 0.55);
    }

    .btn-generate:active:not(:disabled) {
      transform: scale(0.98) translateY(0);
    }

    .btn-generate:focus-visible {
      outline: 2px solid #a5b4fc;
      outline-offset: 3px;
    }

    .btn-generate:disabled {
      cursor: wait;
      opacity: 0.92;
    }

    .btn-generate.is-loading {
      animation: btn-pulse 0.9s ease-in-out infinite;
    }

    .btn-generate.is-loading::before {
      animation: btn-spin-gloss 1.2s linear infinite;
    }

    @keyframes btn-pulse {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.08); }
    }

    @keyframes btn-spin-gloss {
      from { transform: translateX(-100%) rotate(0deg); }
      to { transform: translateX(200%) rotate(360deg); }
    }

    .btn-generate__inner {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-generate__spinner {
      display: none;
      width: 1.125rem;
      height: 1.125rem;
      flex-shrink: 0;
      border: 2px solid rgba(255, 255, 255, 0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
    }

    .btn-generate.is-loading .btn-generate__spinner {
      display: block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .btn-generate.is-loading .btn-generate__label {
      opacity: 0.92;
    }

    @media (max-width: 479px) {
      .app {
        max-width: none;
      }

      .app-footer {
        position: sticky;
        bottom: 0;
        padding-bottom: max(0.35rem, env(safe-area-inset-bottom));
        background: linear-gradient(to top, var(--bg-1) 0%, transparent 100%);
        margin: 0 -0.25rem;
        padding-left: 0.25rem;
        padding-right: 0.25rem;
        margin-top: auto;
      }

      .btn-generate {
        min-height: 3.5rem;
        border-radius: 18px;
        font-size: 1.02rem;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1 class="app-title">Генератор идеи для постов</h1>
      <button
        type="button"
        class="theme-toggle"
        id="themeToggle"
        aria-label="Переключить тему: светлая или тёмная"
        aria-pressed="false"
        title="Тема"
      >
        <span class="theme-toggle__track" aria-hidden="true">
          <span class="theme-toggle__thumb"></span>
        </span>
        <svg class="theme-toggle__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
        </svg>
      </button>
    </header>

    <main class="app-main">
      <div class="card">
        <div class="list-wrap">
          <ul id="ideaList">
            <li>5 идей постов для экспертов</li>
            <li>3 идеи сторис на сегодня</li>
            <li>контент план на неделю</li>
          </ul>
        </div>

        <footer class="app-footer">
          <button type="button" class="btn-generate" id="btnGenerate" aria-busy="false">
            <span class="btn-generate__inner">
              <span class="btn-generate__spinner" aria-hidden="true"></span>
              <span class="btn-generate__label">Сгенерировать идеи</span>
            </span>
          </button>
        </footer>
      </div>
    </main>
  </div>

  <script>
    (function () {
      var storageKey = "post-idea-generator-theme";
      var root = document.documentElement;
      var metaTheme = document.getElementById("meta-theme");
      var toggle = document.getElementById("themeToggle");
      var btn = document.getElementById("btnGenerate");
      var list = document.getElementById("ideaList");

      function applyTheme(theme) {
        root.setAttribute("data-theme", theme);
        toggle.setAttribute("aria-pressed", theme === "dark" ? "true" : "false");
        if (metaTheme) {
          metaTheme.setAttribute("content", theme === "dark" ? "#0f172a" : "#eef2ff");
        }
        try {
          localStorage.setItem(storageKey, theme);
        } catch (e) {}
      }

      function initTheme() {
        var saved = null;
        try {
          saved = localStorage.getItem(storageKey);
        } catch (e) {}
        if (saved === "light" || saved === "dark") {
          applyTheme(saved);
          return;
        }
        if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
          applyTheme("dark");
        } else {
          applyTheme("light");
        }
      }

      toggle.addEventListener("click", function () {
        var next = root.getAttribute("data-theme") === "dark" ? "light" : "dark";
        applyTheme(next);
      });

      btn.addEventListener("click", function () {
        if (btn.disabled) return;
        btn.disabled = true;
        btn.classList.add("is-loading");
        btn.setAttribute("aria-busy", "true");

        list.classList.remove("play");
        list.classList.add("refresh");
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            list.classList.add("play");
          });
        });

        window.setTimeout(function () {
          btn.classList.remove("is-loading");
          btn.disabled = false;
          btn.setAttribute("aria-busy", "false");
          list.classList.remove("refresh", "play");
        }, 1100);
      });

      initTheme();
    })();
  </script>
</body>
</html>
