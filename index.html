<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Генератор идеи для постов</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Manrope", system-ui, sans-serif;
      font-size: 1.0625rem;
      font-weight: 500;
      color: #1e293b;
      line-height: 1.65;
      padding: clamp(1.5rem, 5vw, 3rem);
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(125deg, #eef2ff 0%, #e0f2fe 35%, #f0fdfa 65%, #faf5ff 100%);
      background-size: 280% 280%;
      animation: bg-shift 20s ease-in-out infinite;
    }

    @keyframes bg-shift {
      0%, 100% {
        background-position: 0% 40%;
      }
      50% {
        background-position: 100% 60%;
      }
    }

    main {
      width: 100%;
      max-width: 28rem;
      margin: 0 auto;
      padding: clamp(1.75rem, 4vw, 2.5rem) clamp(1.75rem, 4vw, 2.25rem);
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.85);
      box-shadow:
        0 4px 6px -1px rgba(15, 23, 42, 0.06),
        0 24px 48px -12px rgba(79, 70, 229, 0.12);
      animation: card-in 0.85s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      opacity: 0;
      transform: translateY(16px);
    }

    @keyframes card-in {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      margin: 0 0 1.5rem;
      font-size: clamp(1.35rem, 3.5vw, 1.65rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #0f172a;
      animation: title-in 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.15s forwards;
      opacity: 0;
      transform: translateY(10px);
    }

    @keyframes title-in {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    li {
      position: relative;
      margin-bottom: 0.625rem;
      padding: 0.875rem 1rem 0.875rem 2.75rem;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.55);
      border: 1px solid rgba(226, 232, 240, 0.9);
      transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1),
        box-shadow 0.35s ease,
        border-color 0.35s ease;
      opacity: 0;
      transform: translateX(-8px);
      animation: item-in 0.55s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    li:nth-child(1) { animation-delay: 0.35s; }
    li:nth-child(2) { animation-delay: 0.5s; }
    li:nth-child(3) { animation-delay: 0.65s; }

    @keyframes item-in {
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    li::before {
      content: "";
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }

    li:hover {
      transform: translateX(4px);
      border-color: rgba(165, 180, 252, 0.6);
      box-shadow: 0 8px 20px -8px rgba(99, 102, 241, 0.2);
    }

    li:last-child {
      margin-bottom: 0;
    }
  </style>
</head>
<body>
  <main>
    <h1>Генератор идеи для постов</h1>
    <ul>
      <li>5 идей постов для экспертов</li>
      <li>3 идеи сторис на сегодня</li>
      <li>контент план на неделю</li>
    </ul>
  </main>
</body>
</html>
